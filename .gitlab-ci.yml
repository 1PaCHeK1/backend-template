variables:
  POSTGRES_IMAGE: postgres:15.8
  PYTHON_IMAGE: python:3.12.8-slim-bookworm
  PYTHON_UV_VERSION: ">=0.5.10"

stages:
  - lint


.python-job:
  image: $PYTHON_IMAGE
  interruptible: true
  when: always
  before_script:
    - pip install "uv${PYTHON_UV_VERSION}"
    - uv sync --all-groups
  variables:
    GIT_STRATEGY: clone
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    UV_CACHE_DIR: /tmp/.uv-cache
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - .venv
        - /tmp/.uv-cache
    - key: $CI_COMMIT_REF_SLUG
      paths:
        - .ruff_cache
        - .mypy_cache
  only:
    changes:
      - "**/*.py"
      - pdm.lock
      - pyproject.toml
      - .gitlab-ci.yml

.lint-job:
  extends: .python-job
  stage: lint
  tags: []


pyright:
  extends: .lint-job
  script:
    - uv run pyright .

format:
  extends: .lint-job
  script:
    - uv run ruff format --check --diff .

ruff:
  extends: .lint-job
  script:
    - uv run ruff check .

deptry:
  extends: .lint-job
  script:
    - uv run deptry .

pytest:
  extends: .lint-job

  variables:
    POSTGRES_PASSWORD: password
    POSTGRES_HOST_AUTH_METHOD: trust

    DATABASE_NAME: ""
    DATABASE_HOST: ""
    DATABASE_USERNAME: ""
    DATABASE_PASSWORD: ""

    KEYCLOAK_REDIRECT_URI: ""
    KEYCLOAK_SERVER_URL: ""
    KEYCLOAK_REALM_NAME: ""
    KEYCLOAK_CLIENT_ID: ""
    KEYCLOAK_CLIENT_SECRET_KEY: ""

    TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@postgres/postgres
    TEST_AUTH_PUBLIC_KEY: $TEST_AUTH_PUBLIC_KEY
    TEST_AUTH_PRIVATE_KEY: $TEST_AUTH_PRIVATE_KEY

  services:
    - $POSTGRES_IMAGE

  script:
    - uv run coverage run
    - uv run coverage report -m
    - uv run coverage xml
  coverage: "/^TOTAL.*\\s(\\d*)/"
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  retry:
    max: 2
    when:
    - script_failure
