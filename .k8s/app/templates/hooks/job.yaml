{{- if $.Values.hooks.enabled -}}

{{ $fullname := include "app.fullname" . }}
{{ $labels := include "hooks.labels" . }}

{{ range $name, $hookDef := .Values.hooks.defs }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-{{ $name }}
  labels:
    {{ $labels | nindent 4 }}
    hook-name: "{{ $name }}"
  annotations:
    "helm.sh/hook": {{ $hookDef.trigger }}

spec:
  backoffLimit: {{ $hookDef.backoffLimit }}
  template:
    metadata:
      labels:
        {{ $labels | nindent 8 }}
    spec:
      restartPolicy: Never
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: "hook"
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            {{ range $hookDef.entrypoint }}
            - {{ . | quote }}
            {{ end }}
          envFrom:
            {{- $.Values.common.envFrom | toYaml | nindent 12 }}
          resources:
            {{- toYaml $.Values.hooks.resources | nindent 12 }}
{{- end -}}
{{- end -}}
